app:
  android:
    flavorDimensions: "flavor-type"

flavors:
  apple:
    app:
      name: "Apple App"

    android:
      applicationId: "com.example.apple"
    ohos:
      applicationId: "com.example.apple.ohos"
      customConfig:
        productName: "apple_debug"
      agconnect:
        config: ".agconnect/apple/agconnect-services.json"
    ios:
      bundleId: "com.example.apple"
    macos:
      bundleId: "com.example.apple"

  banana:
    app:
      name: "Banana App"

    android:
      applicationId: "com.example.banana"
    ohos:
      applicationId: "com.example.banana.ohos"
      customConfig:
        productName: "banana_release"
      agconnect:
        config: ".agconnect/banana/agconnect-services.json"
    ios:
      bundleId: "com.example.banana"
    macos:
      bundleId: "com.example.banana"

ide:
  - idea
