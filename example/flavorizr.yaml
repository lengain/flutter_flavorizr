app:
  android:
    flavorDimensions: "flavor-type"

flavors:
  apple:
    app:
      name: "Apple App"

    android:
      applicationId: "com.example.apple"
    ohos:
      bundleName: "com.example.apple.ohos"
      product:
        compatibleSdkVersion: "5.1.0(18)"
        targetSdkVersion: "5.1.0(18)"
        runtimeOS: "HarmonyOS"
        bundleType: "app"
        label: "$string:app_name"
        buildOption:
          strictMode:
            caseSensitiveCheck: true
            useNormalizedOHMUrl: true
        versionName: "1.0.2"
        signingConfig: "apple_debug"
      target:
        source:
          sourceRoots:
            - "./src/apple_files"
          pages:
            - "pages/Index"
        output:
          artifactName: "apple_debug"
        resource:
          directories:
            - "./src/main/apple_debug/resources"
            - "./src/main/resources"
    ios:
      bundleId: "com.example.apple"
    macos:
      bundleId: "com.example.apple"

  banana:
    app:
      name: "Banana App"

    android:
      applicationId: "com.example.banana"
    ohos:
      bundleName: "com.example.banana.ohos"
      product:
        compatibleSdkVersion: "5.1.0(18)"
        runtimeOS: "HarmonyOS"
        bundleType: "app"  
    ios:
      bundleId: "com.example.banana"
    macos:
      bundleId: "com.example.banana"

ide:
  - idea
